<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1020" />
  <title>애완동물DM</title>
  <style>
    :root{
      --line:rgba(255,255,255,.09);
      --text:#f5f7ff;
      --muted:#b6bdd6;
      --pink:#ff4fa3;
      --orange:#ff9d5c;
      --yellow:#ffd86b;
      --shadow:0 18px 60px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0; min-height:100%; width:100%; max-width:100%; overflow-x:hidden;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,79,163,.18), transparent 24%),
        radial-gradient(circle at 100% 10%, rgba(124,131,255,.18), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255,216,107,.10), transparent 28%),
        linear-gradient(180deg,#111223,#0c0d17 58%,#090a12 100%);
    }
    body{
      padding:max(10px, env(safe-area-inset-top)) 10px calc(16px + env(safe-area-inset-bottom));
      display:flex; justify-content:center;
    }
    body::before, body::after {
      content:""; position:fixed; width:220px; height:220px; border-radius:50%;
      filter:blur(70px); opacity:.16; pointer-events:none; animation:floatGlow 8s ease-in-out infinite alternate;
    }
    body::before { top:6%; left:-50px; background:#ff5fa8; }
    body::after { right:-40px; bottom:12%; background:#7f86ff; animation-delay:-3s; }
    @keyframes floatGlow { from { transform:translateY(-10px) scale(1); } to { transform:translateY(12px) scale(1.08); } }

    .app{width:min(100%, 860px); max-width:100%; margin:0 auto;}
    .shell{width:100%; max-width:100%; overflow:hidden; border:1px solid var(--line); border-radius:34px; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); box-shadow:var(--shadow); backdrop-filter:blur(18px);}
    .topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; border-bottom:1px solid var(--line); background:rgba(14,15,27,.72);}
    .icon-btn{width:52px; height:52px; border-radius:50%; border:1px solid var(--line); background:rgba(255,255,255,.06); display:grid; place-items:center; font-size:26px; flex:0 0 auto;}
    .brand{text-align:center; flex:1; min-width:0;}
    .brand .mini{display:block; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; font-weight:800;}
    .brand h1{margin:0; line-height:1; letter-spacing:-.04em; font-weight:900; font-size:clamp(28px,6vw,44px); background:linear-gradient(90deg,var(--orange),var(--pink),#b388ff); -webkit-background-clip:text; background-clip:text; color:transparent;}
    .hero-copy{padding:20px 18px 6px; text-align:center;}
    .hero-title{margin:0; font-size:clamp(28px,7vw,46px); line-height:1.08; letter-spacing:-.04em;}
    .hero-title strong{color:var(--yellow);}

    .stories-wrap{padding:10px 12px 16px;}
    .stories{display:flex; gap:12px; overflow-x:auto; overflow-y:hidden; padding:8px 2px 4px; scrollbar-width:none; scroll-padding-inline:12px;}
    .stories::-webkit-scrollbar{display:none}
    .story{appearance:none; border:0; background:transparent; padding:0; margin:0; flex:0 0 auto; width:112px; color:var(--text); cursor:pointer;}
    .story-card{width:112px; min-height:146px; border-radius:28px; overflow:hidden; padding:14px 10px 12px; border:1px solid var(--line); background:linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.03)); display:flex; flex-direction:column; align-items:center; justify-content:flex-start; box-shadow:0 10px 22px rgba(0,0,0,.15); scroll-snap-align:start;}
    .story-ring{width:70px; height:70px; margin:0 auto 10px; padding:3px; border-radius:50%; background:linear-gradient(135deg,var(--yellow),var(--pink),#7c83ff); box-shadow:0 10px 24px rgba(255,79,163,.18); transition:transform .16s ease, box-shadow .16s ease;}
    .story-ring.active{transform:translateY(-1px) scale(1.03); box-shadow:0 14px 30px rgba(255,216,107,.24);}
    .story-core{width:100%; height:100%; border-radius:50%; background:linear-gradient(180deg,#18192d,#10111f); border:2px solid rgba(255,255,255,.08); display:grid; place-items:center; font-size:30px;}
    .story-label{display:block; width:100%; text-align:center; font-size:12px; font-weight:900; color:var(--text); line-height:1.2; margin-top:2px; word-break:keep-all;}
    .story-sub{display:block; width:100%; text-align:center; font-size:10px; color:var(--muted); line-height:1.25; margin-top:5px; word-break:keep-all;}

    .panel{padding:0 12px 12px;}
    .reel{border:1px solid var(--line); border-radius:30px; overflow:hidden; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));}
    .reel-head{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.04);}
    .profile{display:flex; align-items:center; gap:10px; min-width:0;}
    .avatar{width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,var(--yellow),var(--pink)); padding:2px; flex:0 0 auto;}
    .avatar-inner{width:100%; height:100%; border-radius:50%; background:#111223; display:grid; place-items:center; font-size:24px; border:1px solid rgba(255,255,255,.08);}
    .profile-text{min-width:0;}
    .profile-text strong{display:block; font-size:16px; line-height:1.15; word-break:keep-all;}
    .profile-text small{display:block; color:var(--muted); font-size:12px; line-height:1.35; margin-top:3px; word-break:keep-all;}
    .live-badge{padding:8px 12px; border-radius:999px; font-size:12px; font-weight:900; background:linear-gradient(90deg, rgba(255,79,163,.18), rgba(124,131,255,.16)); color:#ffd2ea; border:1px solid rgba(255,255,255,.08); white-space:nowrap; flex:0 0 auto;}

    .video-wrap{position:relative; aspect-ratio:4/5; background:#07080f; overflow:hidden;}
    video{width:100%; height:100%; object-fit:cover; display:block; background:#000;}
    .video-overlay{position:absolute; inset:0; pointer-events:none; display:flex; flex-direction:column; justify-content:space-between; padding:14px; background:linear-gradient(180deg, rgba(0,0,0,.32), transparent 28%, transparent 62%, rgba(0,0,0,.44));}
    .overlay-top{display:flex; justify-content:space-between; gap:8px; align-items:flex-start;}
    .stack{display:flex; flex-direction:column; gap:8px;}
    .pill{align-self:flex-start; padding:8px 11px; border-radius:999px; border:1px solid rgba(255,255,255,.12); background:rgba(12,13,22,.52); color:#fff; font-size:12px; font-weight:900; backdrop-filter:blur(12px);}
    .rec-pulse{width:9px; height:9px; border-radius:50%; background:#ff617c; display:inline-block; margin-right:6px; box-shadow:0 0 0 0 rgba(255,97,124,.72); animation:pulse 1.2s infinite; vertical-align:middle;}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,97,124,.72)}80%{box-shadow:0 0 0 12px rgba(255,97,124,0)}100%{box-shadow:0 0 0 0 rgba(255,97,124,0)}}
    .overlay-caption{max-width:100%;}
    .overlay-caption .line1{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px;}
    .chip{padding:6px 9px; border-radius:999px; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.12); font-size:12px; font-weight:900;}
    .overlay-caption p{margin:0; font-size:14px; line-height:1.45; color:rgba(255,255,255,.96); text-shadow:0 2px 12px rgba(0,0,0,.45);}
    .record-glow{position:absolute; inset:0; opacity:0; transition:opacity .18s ease; box-shadow: inset 0 0 0 3px rgba(255,93,119,.95), inset 0 0 80px rgba(255,93,119,.18); pointer-events:none;}
    .video-wrap.recording .record-glow{opacity:1}

    .stats-bar{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:12px 14px; border-top:1px solid var(--line); border-bottom:1px solid var(--line); background:rgba(255,255,255,.03);}
    .stat{text-align:center;}
    .stat strong{display:block; font-size:15px;}
    .stat span{display:block; margin-top:3px; font-size:11px; color:var(--muted);}

    .control-pad{padding:14px; display:grid; grid-template-columns:1fr 1fr; gap:10px; background:rgba(255,255,255,.03);}
    button, select{appearance:none; width:100%; border-radius:20px; padding:16px 16px; font-size:16px; font-weight:900; color:var(--text); outline:none;}
    button{cursor:pointer; border:1px solid var(--line); background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.06));}
    button.primary{color:#2a1708; background:linear-gradient(180deg,#ffe28b,#ffb85d); box-shadow:0 14px 30px rgba(255,184,93,.24);}
    button.recording{color:#fff; background:linear-gradient(180deg,#ff7b94,#ff4f6d); box-shadow:0 14px 30px rgba(255,79,109,.22);}
    button:disabled{opacity:.45; cursor:not-allowed; box-shadow:none}
    select{border:1px solid var(--line); background:linear-gradient(180deg, rgba(255,255,255,.1), rgba(255,255,255,.06)); text-align:center; text-align-last:center; -moz-text-align-last:center; padding-left:40px; padding-right:40px;}
    .full{grid-column:1/-1;}

    .chat-card{margin:0 12px 12px; border:1px solid var(--line); border-radius:28px; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)); overflow:hidden;}
    .chat-head{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; border-bottom:1px solid var(--line);}
    .chat-head strong{font-size:15px;}
    .chat-head small{color:var(--muted); text-align:right;}
    .chat-body{padding:14px; display:flex; flex-direction:column; gap:12px;}
    .msg-row{display:flex; gap:10px; align-items:flex-end;}
    .msg-row.me{justify-content:flex-end;}
    .mini-avatar{width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#ffcf68,#ff5ea5); padding:2px; flex:0 0 auto;}
    .mini-avatar>div{width:100%; height:100%; border-radius:50%; background:#10111d; display:grid; place-items:center; font-size:17px;}
    .msg{max-width:min(82%, 520px); padding:14px 16px; border-radius:22px; line-height:1.55; font-size:16px; box-shadow:0 8px 22px rgba(0,0,0,.16); word-break:keep-all; overflow-wrap:anywhere;}
    .msg.info{background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); color:var(--muted);}
    .msg.pet{background:linear-gradient(180deg,#fff0d1,#ffe0a6); color:#351e0b; font-weight:900; font-size:clamp(18px, 4vw, 24px);}

    .footer{padding:10px 16px 16px; text-align:center; color:rgba(255,255,255,.6); font-size:12px; line-height:1.55;}
    .bottom-nav{display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:12px 14px 16px; border-top:1px solid var(--line); background:rgba(14,15,26,.72);}
    .bottom-nav .item{display:grid; place-items:center; gap:4px; color:var(--muted); font-size:11px; font-weight:800;}
    .bottom-nav .item strong{font-size:18px; line-height:1;}
    .bottom-nav .item.active{color:#fff;}

    @media (max-width:680px){
      .control-pad{grid-template-columns:1fr;}
      .chat-head{align-items:flex-start;}
      .chat-head small{text-align:left;}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <header class="topbar">
        <div class="icon-btn" aria-hidden="true">📷</div>
        <div class="brand">
          <span class="mini">toy pet translator</span>
          <h1>애완동물DM</h1>
        </div>
        <div class="icon-btn" aria-hidden="true">✉️</div>
      </header>

      <section class="hero-copy">
        <h2 class="hero-title">찍으면 DM이 온다. <strong>귀엽고 웃기게.</strong></h2>
      </section>

      <section class="stories-wrap">
        <div id="stories" class="stories" aria-label="동물 빠른 선택"></div>
      </section>

      <section class="panel">
        <div class="reel">
          <div class="reel-head">
            <div class="profile">
              <div class="avatar"><div id="mainAvatar" class="avatar-inner">🐶</div></div>
              <div class="profile-text">
                <strong id="selectedAnimalLabel">강아지</strong>
                <small id="selectedAnimalSub">산책과 간식에 진심</small>
              </div>
            </div>
            <div id="liveBadge" class="live-badge">대기 중</div>
          </div>

          <div id="videoWrap" class="video-wrap">
            <video id="preview" playsinline autoplay muted></video>
            <div class="video-overlay">
              <div class="overlay-top">
                <div class="stack">
                  <div id="modeBadge" class="pill">🐶 준비 전</div>
                  <div id="timerBadge" class="pill">00:00</div>
                </div>
                <div class="pill">애완동물DM</div>
              </div>
            <div class="record-glow"></div>
          </div>

          <div class="stats-bar">
            <div class="stat"><strong id="likeCount">3,284</strong><span>좋아요</span></div>
            <div class="stat"><strong id="commentCount">184</strong><span>댓글</span></div>
            <div class="stat"><strong id="shareCount">49</strong><span>공유</span></div>
            <div class="stat"><strong id="saveCount">221</strong><span>저장</span></div>
          </div>

          <div class="control-pad">
            <button id="startCameraBtn" class="primary">카메라 켜기</button>
            <button id="recordBtn" disabled>녹화 시작</button>
            <select id="petType" class="full" aria-label="동물 종류 선택"></select>
            <button id="voiceBtn" class="full">음성 읽기 켜짐</button>
          </div>
        </div>
      </section>

      <section class="chat-card">
        <div class="chat-head">
          <div>
            <strong>DM 수신함</strong><br />
            <small>애완동물이 보낸 한마디</small>
          </div>
          <small id="messageMeta">아직 도착한 DM이 없습니다</small>
        </div>
        <div class="chat-body">
          <div class="msg-row">
            <div class="mini-avatar"><div id="dmAvatar">🐶</div></div>
            <div class="msg pet" id="resultText">“산책 갈 준비는 늘 되어 있어요.”</div>
          </div>
        </div>
      </section>

      <footer class="footer">
        애완동물DM · 장난감 감성 모바일 웹앱<br />
        만든이 <strong>@hosukgun</strong>
      </footer>

      <nav class="bottom-nav" aria-hidden="true">
        <div class="item active"><strong>🏠</strong><span>홈</span></div>
        <div class="item"><strong>🔍</strong><span>탐색</span></div>
        <div class="item"><strong>🎬</strong><span>릴스</span></div>
        <div class="item"><strong>💌</strong><span>DM</span></div>
        <div class="item"><strong>👤</strong><span>프로필</span></div>
      </nav>
    </section>
  </main>

      "카메라를 켰지만 가장 어색한 건 인간입니다.",

    const storyOrder = ["dog", "cat", "hamster", "rabbit", "parrot", "turtle", "hedgehog", "ferret", "desertscorpion", "forestscorpion", "centipede", "crayfish", "shrimp", "crestedgecko", "beardeddragon", "snake", "frog", "tarantula", "stagbeetle", "rhinobeetle", "mantis", "goldfish", "betta", "guppy", "koi", "axolotl", "pleco", "clownfish", "bluetang", "mandarinfish", "goby", "human"];
    const groupOrder = ["친숙한 반려동물", "특이한 친구들", "곤충 친구들", "담수어", "해수어", "마지막 손님"];

    const startCameraBtn = document.getElementById("startCameraBtn");
    const recordBtn = document.getElementById("recordBtn");
    const voiceBtn = document.getElementById("voiceBtn");
    const petType = document.getElementById("petType");
    const preview = document.getElementById("preview");
    const resultText = document.getElementById("resultText");
    const timerBadge = document.getElementById("timerBadge");
    const modeBadge = document.getElementById("modeBadge");
    const videoWrap = document.getElementById("videoWrap");
    const liveBadge = document.getElementById("liveBadge");
    const selectedAnimalLabel = document.getElementById("selectedAnimalLabel");
    const selectedAnimalSub = document.getElementById("selectedAnimalSub");
    const mainAvatar = document.getElementById("mainAvatar");
    const dmAvatar = document.getElementById("dmAvatar");
    const messageMeta = document.getElementById("messageMeta");
    const stories = document.getElementById("stories");
    const likeCount = document.getElementById("likeCount");
    const commentCount = document.getElementById("commentCount");
    const shareCount = document.getElementById("shareCount");
    const saveCount = document.getElementById("saveCount");

    let stream = null;
    let mediaRecorder = null;
    let isRecording = false;
    let timerId = null;
    let recordStart = 0;
    let voiceEnabled = true;
    let lastPhrase = "";

    function buildSelectOptions() {
      petType.innerHTML = "";
      groupOrder.forEach(group => {
        const og = document.createElement("optgroup");
        og.label = group;
        storyOrder.forEach(key => {
          const pet = pets[key];
          if (pet.group !== group) return;
          const opt = document.createElement("option");
          opt.value = key;
          opt.textContent = pet.label;
          og.appendChild(opt);
        });
        if (og.children.length) petType.appendChild(og);
      });
      petType.value = "dog";
    }

    function renderStories() {
      stories.innerHTML = "";
      storyOrder.forEach(key => {
        const pet = pets[key];
        const item = document.createElement("button");
        item.type = "button";
        item.className = "story";
        item.dataset.key = key;
        item.innerHTML = `
          <div class="story-card">
            <div class="story-ring ${petType.value === key ? "active" : ""}">
              <div class="story-core">${pet.emoji}</div>
            </div>
            <span class="story-label">${pet.label}</span>
            <span class="story-sub">${pet.group}</span>
          </div>
        `;
        item.addEventListener("click", () => {
          petType.value = key;
          updatePetUI();
        });
        stories.appendChild(item);
      });
    }

    function currentKey() {
      return pets[petType.value] ? petType.value : "dog";
    }

    function formatTime(ms) {
      const total = Math.floor(ms / 1000);
      const mm = String(Math.floor(total / 60)).padStart(2, "0");
      const ss = String(total % 60).padStart(2, "0");
      return `${mm}:${ss}`;
    }

    function pickRandom(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function computeCounters(key, phrase) {
      const seed = [...(key + "|" + phrase)].reduce((a, c) => a + c.charCodeAt(0), 0);
      likeCount.textContent = (1300 + (seed * 37) % 8200).toLocaleString("ko-KR");
      commentCount.textContent = (25 + (seed * 13) % 680).toLocaleString("ko-KR");
      shareCount.textContent = (8 + (seed * 11) % 240).toLocaleString("ko-KR");
      saveCount.textContent = (18 + (seed * 17) % 520).toLocaleString("ko-KR");
    }

    function speak(text) {
      if (!voiceEnabled || !("speechSynthesis" in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "ko-KR";
      utter.rate = 1;
      utter.pitch = 1.06;
      window.speechSynthesis.speak(utter);
    }

    function updatePetUI() {
      const pet = pets[currentKey()];
      selectedAnimalLabel.textContent = pet.label;
      selectedAnimalSub.textContent = pet.desc;
      mainAvatar.textContent = pet.emoji;
      modeBadge.textContent = `${pet.emoji} ${stream ? "촬영 준비" : "준비 전"}`;
      renderStories();
    }

    function startTimer() {
      recordStart = Date.now();
      timerBadge.textContent = "00:00";
      timerId = setInterval(() => {
        timerBadge.textContent = formatTime(Date.now() - recordStart);
      }, 200);
    }

    function stopTimer() {
      clearInterval(timerId);
      timerId = null;
      timerBadge.textContent = "00:00";
    }

    async function startCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        alert("이 브라우저는 카메라 접근을 지원하지 않습니다.");
        return;
      }
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1080 },
            height: { ideal: 1920 }
          },
          audio: true
        });
        preview.srcObject = stream;
        startCameraBtn.disabled = true;
        recordBtn.disabled = false;
        liveBadge.textContent = "카메라 연결됨";
        modeBadge.textContent = `${pets[currentKey()].emoji} 촬영 준비`;
      } catch (err) {
        console.error(err);
        alert("카메라 또는 마이크 권한을 허용해 주세요.");
      }
    }

    function createRecorder() {
      const optionsToTry = [
        "video/webm;codecs=vp9,opus",
        "video/webm;codecs=vp8,opus",
        "video/webm",
        "video/mp4"
      ];
      let options = undefined;
      if (window.MediaRecorder && MediaRecorder.isTypeSupported) {
        const supported = optionsToTry.find(type => {
          try { return MediaRecorder.isTypeSupported(type); } catch (_) { return false; }
        });
        if (supported) options = { mimeType: supported };
      }
      return options ? new MediaRecorder(stream, options) : new MediaRecorder(stream);
    }

    function deliverPhrase() {
      const pet = pets[currentKey()];
      const text = pickRandom(pet.phrases);
      lastPhrase = text;
      dmAvatar.textContent = pet.emoji;
      resultText.textContent = `“${text}”`;
      messageMeta.textContent = `${pet.label} DM · ` + new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
      computeCounters(currentKey(), text);
      speak(text);
    }

    function startRecording() {
      if (!stream) {
        alert("먼저 카메라를 켜 주세요.");
        return;
      }
      if (!window.MediaRecorder) {
        alert("이 브라우저는 녹화 기능을 지원하지 않습니다.");
        return;
      }
      try {
        mediaRecorder = createRecorder();
      } catch (err) {
        console.error(err);
        alert("녹화기를 만들지 못했습니다.");
        return;
      }
      mediaRecorder.onstop = deliverPhrase;
      mediaRecorder.start();
      isRecording = true;
      videoWrap.classList.add("recording");
      recordBtn.textContent = "녹화 종료";
      recordBtn.classList.add("recording");
      liveBadge.innerHTML = '<span class="rec-pulse"></span>REC';
      modeBadge.innerHTML = `<span class="rec-pulse"></span>${pets[currentKey()].label} 녹화 중`;
      startTimer();
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
      isRecording = false;
      videoWrap.classList.remove("recording");
      recordBtn.textContent = "녹화 시작";
      recordBtn.classList.remove("recording");
      liveBadge.textContent = "카메라 연결됨";
      modeBadge.textContent = `${pets[currentKey()].emoji} 촬영 준비`;
      stopTimer();
    }

    startCameraBtn.addEventListener("click", startCamera);
    recordBtn.addEventListener("click", () => {
      if (!isRecording) startRecording();
      else stopRecording();
    });
    voiceBtn.addEventListener("click", () => {
      voiceEnabled = !voiceEnabled;
      voiceBtn.textContent = voiceEnabled ? "음성 읽기 켜짐" : "음성 읽기 꺼짐";
      if (!voiceEnabled && "speechSynthesis" in window) window.speechSynthesis.cancel();
      if (voiceEnabled && lastPhrase) speak(lastPhrase);
    });
    petType.addEventListener("change", updatePetUI);

    buildSelectOptions();
    updatePetUI();
    deliverPhrase();
  </script>
