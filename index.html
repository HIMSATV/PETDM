<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121224" />
  <title>애완동물DM 꾸밈 사진판</title>
  <style>
    :root {
      --bg1:#121224;
      --bg2:#0b0c16;
      --line:rgba(255,255,255,.10);
      --text:#f6f7ff;
      --muted:#bcc3dd;
      --pink:#ff5ca8;
      --orange:#ffb86d;
      --violet:#8a7dff;
      --yellow:#ffd96a;
      --shadow:0 20px 60px rgba(0,0,0,.35);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      margin:0; padding:0; width:100%; min-height:100%;
      background:
        radial-gradient(circle at 12% 0%, rgba(255,92,168,.18), transparent 24%),
        radial-gradient(circle at 100% 10%, rgba(138,125,255,.17), transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(255,217,106,.08), transparent 24%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
      overflow-x:hidden;
    }
    body {
      padding:max(10px, env(safe-area-inset-top)) 10px calc(20px + env(safe-area-inset-bottom));
      display:flex; justify-content:center;
    }
    body::before, body::after {
      content:""; position:fixed; width:230px; height:230px; border-radius:50%;
      filter:blur(70px); opacity:.16; pointer-events:none;
    }
    body::before { left:-60px; top:6%; background:#ff5ca8; }
    body::after { right:-50px; bottom:10%; background:#7a82ff; }

    .app {
      width:min(100%, 860px);
      border:1px solid var(--line);
      border-radius:34px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
    }

    .topbar {
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      padding:14px 16px; border-bottom:1px solid var(--line);
      background:rgba(13,14,24,.74);
    }
    .icon-btn {
      width:52px; height:52px; border-radius:50%;
      display:grid; place-items:center; flex:0 0 auto;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      font-size:24px;
    }
    .brand { flex:1; min-width:0; text-align:center; }
    .brand h1 {
      margin:0; line-height:1; font-size:clamp(28px, 6vw, 42px); font-weight:900;
      letter-spacing:-.04em;
      background:linear-gradient(90deg, var(--orange), var(--pink), #b38cff);
      -webkit-background-clip:text; background-clip:text; color:transparent;
    }

    .stories-wrap { padding:12px 12px 16px; }
    .stories {
      display:flex; gap:12px; overflow-x:auto; overflow-y:hidden; padding:8px 2px 4px;
      scrollbar-width:none;
    }
    .stories::-webkit-scrollbar { display:none; }
    .story {
      appearance:none; border:0; background:transparent; padding:0; margin:0;
      color:var(--text); width:112px; flex:0 0 auto; cursor:pointer;
    }
    .story-card {
      width:112px; min-height:138px; border-radius:28px; overflow:hidden;
      padding:14px 10px 12px; border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.03));
      display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    }
    .story-ring {
      width:70px; height:70px; margin:0 auto 10px; padding:3px; border-radius:50%;
      background:linear-gradient(135deg, var(--yellow), var(--pink), #7d82ff);
      box-shadow:0 10px 24px rgba(255,92,168,.18);
      transition:transform .16s ease;
    }
    .story-ring.active { transform:translateY(-1px) scale(1.03); }
    .story-core {
      width:100%; height:100%; border-radius:50%; display:grid; place-items:center;
      background:linear-gradient(180deg, #18192e, #10111f);
      border:2px solid rgba(255,255,255,.08);
      font-size:30px;
    }
    .story-label, .story-sub { width:100%; text-align:center; word-break:keep-all; }
    .story-label { font-size:12px; font-weight:900; line-height:1.2; }
    .story-sub { font-size:10px; color:var(--muted); line-height:1.25; margin-top:5px; }

    .panel { padding:0 12px 16px; }
    .camera-card {
      border:1px solid var(--line);
      border-radius:30px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    }
    .camera-head {
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px 14px; border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.04);
    }
    .profile { display:flex; align-items:center; gap:10px; min-width:0; }
    .avatar {
      width:52px; height:52px; border-radius:50%; padding:2px; flex:0 0 auto;
      background:linear-gradient(135deg, var(--yellow), var(--pink));
    }
    .avatar-inner {
      width:100%; height:100%; border-radius:50%; display:grid; place-items:center;
      background:#10111f; border:1px solid rgba(255,255,255,.08); font-size:24px;
    }
    .profile-text strong {
      display:block; font-size:16px; line-height:1.15; word-break:keep-all;
    }
    .status-pill {
      padding:8px 12px; border-radius:999px; white-space:nowrap; flex:0 0 auto;
      font-size:12px; font-weight:900; color:#ffdced;
      background:linear-gradient(90deg, rgba(255,92,168,.18), rgba(138,125,255,.16));
      border:1px solid rgba(255,255,255,.08);
    }

    .camera-area {
      position:relative; aspect-ratio:4/5; background:#05060e; overflow:hidden;
    }
    video, .photo-preview {
      display:block; width:100%; height:100%; object-fit:cover; background:#000;
    }
    .photo-preview { display:none; }
    .camera-overlay {
      position:absolute; inset:0; pointer-events:none;
      display:flex; flex-direction:column; justify-content:space-between;
      padding:14px;
      background:linear-gradient(180deg, rgba(0,0,0,.22), transparent 30%, transparent 68%, rgba(0,0,0,.30));
    }
    .overlay-top {
      display:flex; justify-content:space-between; gap:8px; align-items:flex-start;
    }
    .stack { display:flex; flex-direction:column; gap:8px; }
    .pill {
      align-self:flex-start; padding:8px 11px; border-radius:999px;
      border:1px solid rgba(255,255,255,.12); background:rgba(12,13,22,.52);
      color:#fff; font-size:12px; font-weight:900; backdrop-filter:blur(12px);
    }

    .controls {
      padding:14px;
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      background:rgba(255,255,255,.03);
      border-top:1px solid var(--line);
    }
    button, input {
      appearance:none; width:100%;
      border-radius:20px;
      padding:16px 18px;
      font-size:16px; font-weight:900;
      color:var(--text);
      border:1px solid var(--line);
      outline:none;
      background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.06));
    }
    button { cursor:pointer; }
    button.primary {
      color:#2a1708;
      background:linear-gradient(180deg, #ffe28b, #ffb85d);
      box-shadow:0 14px 30px rgba(255,184,93,.24);
    }
    button:disabled {
      opacity:.45; cursor:not-allowed; box-shadow:none;
    }
    input {
      text-align:center;
    }
    input::placeholder {
      color:rgba(245,247,255,.58);
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="icon-btn" aria-hidden="true">📷</div>
      <div class="brand">
        <h1>애완동물DM</h1>
      </div>
      <div class="icon-btn" aria-hidden="true">💬</div>
    </header>

    <section class="stories-wrap">
      <div id="stories" class="stories" aria-label="동물 빠른 선택"></div>
    </section>

    <select id="petType" aria-label="동물 종류 선택" style="display:none"></select>

    <section class="panel">
      <div class="camera-card">
        <div class="camera-head">
          <div class="profile">
            <div class="avatar"><div id="mainAvatar" class="avatar-inner">🐶</div></div>
            <div class="profile-text">
              <strong id="selectedAnimalLabel">강아지</strong>
            </div>
          </div>
          <div id="statusBadge" class="status-pill">대기 중</div>
        </div>

        <div class="camera-area">
          <video id="preview" playsinline autoplay muted></video>
          <img id="photoPreview" class="photo-preview" alt="촬영한 사진 미리보기" />
          <div id="cameraOverlay" class="camera-overlay">
            <div class="overlay-top">
              <div class="stack">
                <div id="modeBadge" class="pill">🐶 사진 준비</div>
              </div>
              <div class="pill">애완동물DM</div>
            </div>
          </div>
        </div>

        <div class="controls">
          <button id="startCameraBtn" class="primary">카메라 켜기</button>
          <button id="captureBtn" disabled>사진 찍기</button>
          <button id="retakeBtn" disabled>다시 찍기</button>
          <input id="userHandle" type="text" maxlength="24" placeholder="@아이디 입력" value="@hosukgun" aria-label="결과물에 넣을 아이디" />
          <button id="downloadBtn" disabled>다운로드</button>
        </div>
      </div>
    </section>
  </main>

  <canvas id="captureCanvas" style="display:none"></canvas>
  <canvas id="exportCanvas" style="display:none"></canvas>

  <script>
    const PETS = {"dog": {"label": "강아지", "emoji": "🐶", "group": "친숙한 반려동물", "desc": "산책과 간식에 진심", "phrases": ["산책 갈 준비는 늘 되어 있어요.", "꼬리 흔들기로 이미 답장 보냈어요.", "간식 얘기면 바로 인터뷰 가능합니다."]}, "cat": {"label": "고양이", "emoji": "🐱", "group": "친숙한 반려동물", "desc": "도도하지만 은근 다정", "phrases": ["오늘도 저를 잘 모시고 있군요.", "지금은 쓰다듬기 4초까지만 허용합니다.", "집사는 합격. 서비스는 조금 더 개선하세요."]}, "hamster": {"label": "햄스터", "emoji": "🐹", "group": "친숙한 반려동물", "desc": "볼주머니 비즈니스 중", "phrases": ["제 볼은 저장공간이 아니라 자존심입니다.", "해바라기씨 선입금 후 인터뷰하겠습니다.", "지금 뛰는 건 운동이 아니라 중요한 업무예요."]}, "rabbit": {"label": "토끼", "emoji": "🐰", "group": "친숙한 반려동물", "desc": "깡총 에너지 가득", "phrases": ["당근 없이는 답변도 없습니다.", "깡총거림은 감정 표현이자 예술입니다.", "사진보다 실물이 더 말랑해요."]}, "parrot": {"label": "앵무새", "emoji": "🦜", "group": "친숙한 반려동물", "desc": "말 많은 스타", "phrases": ["오늘도 제가 집안 여론을 담당합니다.", "방금 들은 말은 내일 다시 따라 할 예정입니다.", "예쁜 말도 하고 웃긴 말도 하고 간식도 먹습니다."]}, "turtle": {"label": "거북이", "emoji": "🐢", "group": "친숙한 반려동물", "desc": "느긋하지만 중심 있음", "phrases": ["천천히 가도 귀여움은 먼저 도착합니다.", "급한 건 사람들 사정이고 나는 평온해요.", "한 걸음 한 걸음이 다 브이로그예요."]}, "hedgehog": {"label": "고슴도치", "emoji": "🦔", "group": "친숙한 반려동물", "desc": "뾰족하지만 사랑스러움", "phrases": ["겉은 뾰족, 속은 간식 생각뿐.", "가까이 오되 예의는 지켜 주세요.", "조심히 예뻐해 주세요. 저는 섬세합니다."]}, "ferret": {"label": "페럿", "emoji": "🦦", "group": "친숙한 반려동물", "desc": "장난기 폭발 탐험가", "phrases": ["집 안의 모든 틈은 제 후보지입니다.", "방금 숨은 건 마술이 아니라 취미예요.", "귀엽고 길고 이상하게 빠릅니다."]}, "desertscorpion": {"label": "건계전갈", "emoji": "🦂", "group": "특이한 친구들", "desc": "사막 감성의 카리스마", "phrases": ["나는 조용하지만 존재감은 크게 남깁니다.", "집게 든 건 위협이 아니라 포즈입니다.", "오늘도 사막의 CEO처럼 차분합니다."]}, "forestscorpion": {"label": "습계전갈", "emoji": "🦂", "group": "특이한 친구들", "desc": "습도 좋아하는 묵직함", "phrases": ["습도만 맞으면 기분도 같이 올라갑니다.", "어두운 곳에서도 존재감은 선명합니다.", "오늘도 묵직하게 무드 담당 중입니다."]}, "centipede": {"label": "지네", "emoji": "🪱", "group": "특이한 친구들", "desc": "다리 많은 초고속 존재감", "phrases": ["다리가 많다고 바쁜 건 아니고 원래 빠른 겁니다.", "조용히 있는데도 자꾸 눈이 가죠?", "내 움직임은 스피드의 미학입니다."]}, "crayfish": {"label": "가재", "emoji": "🦞", "group": "특이한 친구들", "desc": "집게발 자신     const ORDER = ["dog", "cat", "hamster", "rabbit", "parrot", "turtle", "hedgehog", "ferret", "desertscorpion", "forestscorpion", "centipede", "crayfish", "shrimp", "crestedgecko", "beardeddragon", "snake", "frog", "tarantula", "stagbeetle", "rhinobeetle", "mantis", "goldfish", "betta", "guppy", "koi", "axolotl", "pleco", "clownfish", "bluetang", "mandarinfish", "goby", "human"];

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function wrapKoreanText(ctx, text, x, y, maxWidth, lineHeight) {
      let line = "";
      let lines = [];
      for (const ch of text) {
        const testLine = line + ch;
        if (ctx.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = testLine;
        }
      }
      if (line) lines.push(line);
      let currentY = y;
      lines.forEach(l => {
        ctx.fillText(l, x, currentY);
        currentY += lineHeight;
      });
      return currentY;
    }

    function wrapKoreanTextCenterBox(ctx, text, boxX, boxY, boxW, boxH, lineHeight) {
      let line = "";
      let lines = [];
      for (const ch of text) {
        const testLine = line + ch;
        if (ctx.measureText(testLine).width > boxW && line) {
          lines.push(line);
          line = ch;
        } else {
          line = testLine;
        }
      }
      if (line) lines.push(line);

      const totalHeight = Math.max(lineHeight, lines.length * lineHeight);
      let currentY = boxY + (boxH - totalHeight) / 2 + lineHeight * 0.82;
      const centerX = boxX + boxW / 2;

      lines.forEach(l => {
        const w = ctx.measureText(l).width;
        ctx.fillText(l, centerX - w / 2, currentY);
        currentY += lineHeight;
      });
      return currentY;
    }

    function fitImageToRect(srcW, srcH, dstW, dstH) {
      const srcRatio = srcW / srcH;
      const dstRatio = dstW / dstH;
      let sx = 0, sy = 0, sw = srcW, sh = srcH;
      if (srcRatio > dstRatio) {
        sw = srcH * dstRatio;
        sx = (srcW - sw) / 2;
      } else {
        sh = srcW / dstRatio;
        sy = (srcH - sh) / 2;
      }
      return { sx, sy, sw, sh };
    }

    
function buildDecoratedImage() {

          ctx.drawImage(photo, crop.sx, crop.sy, crop.sw, crop.sh, 0, 0, canvas.width, canvas.height);

          // Stronger cute Instagram-like grading
          const tint = ctx.createLinearGradient(0, 0, 0, canvas.height);
          tint.addColorStop(0, "rgba(255,232,196,.18)");
          tint.addColorStop(.22, "rgba(255,153,198,.12)");
          tint.addColorStop(.54, "rgba(164,133,255,.12)");
          tint.addColorStop(1, "rgba(38,28,84,.24)");
          ctx.fillStyle = tint;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const light = ctx.createRadialGradient(260, 180, 40, 260, 180, 340);
          light.addColorStop(0, "rgba(255,248,220,.18)");
          light.addColorStop(1, "rgba(255,248,220,0)");
          ctx.fillStyle = light;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const pinkGlow = ctx.createRadialGradient(900, 220, 20, 900, 220, 260);
          pinkGlow.addColorStop(0, "rgba(255,95,170,.16)");
          pinkGlow.addColorStop(1, "rgba(255,95,170,0)");
          ctx.fillStyle = pinkGlow;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const vignette = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 140, canvas.width/2, canvas.height/2, canvas.width*.74);
          vignette.addColorStop(0, "rgba(0,0,0,0)");
          vignette.addColorStop(1, "rgba(0,0,0,.28)");
          ctx.fillStyle = vignette;
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // cute border overlay
          ctx.strokeStyle = "rgba(255,255,255,.18)";
          ctx.lineWidth = 6;
          roundRect(ctx, 18, 18, canvas.width - 36, canvas.height - 36, 34);
          ctx.stroke();
          ctx.strokeStyle = "rgba(255,255,255,.08)";
          ctx.lineWidth = 2;
          roundRect(ctx, 30, 30, canvas.width - 60, canvas.height - 60, 28);
          ctx.stroke();

          // top centered logo
          const logoW = 244, logoH = 58;
          const logoX = (canvas.width - logoW) / 2;
          const logoY = 34;
          const logoGrad = ctx.createLinearGradient(logoX, logoY, logoX + logoW, logoY + logoH);
          logoGrad.addColorStop(0, "rgba(255,184,109,.96)");
          logoGrad.addColorStop(.5, "rgba(255,92,168,.95)");
          logoGrad.addColorStop(1, "rgba(138,125,255,.95)");
          ctx.fillStyle = logoGrad;
          roundRect(ctx, logoX, logoY, logoW, logoH, 29);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,.34)";
          ctx.lineWidth = 1.5;
          roundRect(ctx, logoX, logoY, logoW, logoH, 29);
          ctx.stroke();
          ctx.fillStyle = "#fff";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = "900 26px -apple-system, Apple SD Gothic Neo, Noto Sans KR, sans-serif";
          ctx.fillText("펫디엠", logoX + logoW / 2, logoY + logoH / 2 + 1);

          // More decorative stickers
          ctx.font = "34px -apple-system, Apple SD Gothic Neo, Noto Sans KR, sans-serif";
          ctx.fillText("✨", 54, 84);
          ctx.fillText("💖", 962, 96);
          ctx.fillText("⭐", 944, 160);
          ctx.fillText("🌷", 64, 1120);
          ctx.fillText("🫧", 930, 1138);
          ctx.fillText("🎀", 84, 152);
          ctx.fillText("💫", 900, 1030);
          ctx.fillText("🌸", 70, 980);

          // subtle watermark bottom right
          ctx.fillStyle = "rgba(0,0,0,.24)";
          roundRect(ctx, canvas.width - 244, canvas.height - 82, 200, 40, 20);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,.18)";
          ctx.lineWidth = 1.2;
          roundRect(ctx, canvas.width - 244, canvas.height - 82, 200, 40, 20);
          ctx.stroke();
          ctx.fillStyle = "#fff";
          ctx.font = "900 22px -apple-system, Apple SD Gothic Neo, Noto Sans KR, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(handle, canvas.width - 144, canvas.height - 62);

          // tail-less speech bubble
          const bubbleW = 900;
          const bubbleH = 154;
          const bubbleX = (canvas.width - bubbleW) / 2;
          const bubbleY = canvas.height - 270;
          ctx.fillStyle = "rgba(255,255,255,.96)";
          roundRect(ctx, bubbleX, bubbleY, bubbleW, bubbleH, 34);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,.30)";
          ctx.lineWidth = 1.5;
          roundRect(ctx, bubbleX, bubbleY, bubbleW, bubbleH, 34);
          ctx.stroke();

          // tiny decor around bubble
          ctx.font = "28px -apple-system, Apple SD Gothic Neo, Noto Sans KR, sans-serif";
          ctx.fillText("🌷", bubbleX - 10, bubbleY + bubbleH - 18);
          ctx.fillText("💗", bubbleX + bubbleW - 12, bubbleY + 28);

          // Centered text inside bubble
          ctx.fillStyle = "#241a28";
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
          ctx.font = "900 42px -apple-system, Apple SD Gothic Neo, Noto Sans KR, sans-serif";
          wrapKoreanTextCenter(ctx, `“${lastQuote}”`, canvas.width / 2, bubbleY + 60, bubbleW - 72, 50);

          exportDataUrl = canvas.toDataURL("image/png");
          photoPreview.src = exportDataUrl;
          photoPreview.style.display = "block";
          preview.style.display = "none";
          cameraOverlay.style.display = "none";

          if (exportObjectUrl) {
            URL.revokeObjectURL(exportObjectUrl);
            exportObjectUrl = "";
          }

          const finishWithBlob = (blob) => {
            exportBlob = blob;
            downloadBtn.disabled = false;
            downloadBtn.textContent = "다운로드";
            if (blob) {
              exportObjectUrl = URL.createObjectURL(blob);
              resolve(true);
            } else {
              resolve(false);
            }
          };

          if (canvas.toBlob) {
            canvas.toBlob((blob) => finishWithBlob(blob), "image/png");
          } else {
            try {
              const byteString = atob(exportDataUrl.split(",")[1]);
              const mimeString = exportDataUrl.split(",")[0].split(":")[1].split(";")[0];
              const ab = new ArrayBuffer(byteString.length);
              const ia = new Uint8Array(ab);
              for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
              finishWithBlob(new Blob([ab], { type: mimeString }));
            } catch (e) {
              console.error(e);
              finishWithBlob(null);
            }
          }
        };

        photo.onerror = () => {
          downloadBtn.disabled = true;
          downloadBtn.textContent = "다운로드";
          resolve(false);
        };

        photo.src = capturedDataUrl;
      });
    }


    function capturePhoto() {
      if (!stream) {
        alert("먼저 카메라를 켜 주세요.");
        return;
      }
      const vw = preview.videoWidth;
      const vh = preview.videoHeight;
      if (!vw || !vh) {
        alert("카메라 화면이 아직 준비되지 않았습니다.");
        return;
      }

      const canvas = captureCanvas;
      canvas.width = vw;
      canvas.height = vh;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(preview, 0, 0, vw, vh);

      capturedDataUrl = canvas.toDataURL("image/jpeg", 0.95);
      const pet = currentPet();
      lastQuote = pickRandom(pet.phrases);

      statusBadge.textContent = "사진 완성";
      captureBtn.disabled = true;
      retakeBtn.disabled = false;
      downloadBtn.disabled = true;
      downloadBtn.textContent = "이미지 만드는 중...";

      buildDecoratedImage();
    }

    function retakePhoto() {
      capturedDataUrl = "";
      exportDataUrl = "";
      exportBlob = null;
      if (exportObjectUrl) {
        URL.revokeObjectURL(exportObjectUrl);
        exportObjectUrl = "";
      }
      photoPreview.removeAttribute("src");
      photoPreview.style.display = "none";
      preview.style.display = "block";
      cameraOverlay.style.display = "flex";
      statusBadge.textContent = stream ? "카메라 연결됨" : "대기 중";
      captureBtn.disabled = !stream;
      retakeBtn.disabled = true;
      downloadBtn.disabled = true;
      downloadBtn.textContent = "다운로드";
      updatePetUI();
    }

    async function downloadResult() {
      if (!exportDataUrl) {
        alert("먼저 사진을 찍어 주세요.");
        return;
      }

      const fileName = `petdm-cute-${Date.now()}.png`;

      if (exportBlob) {
        try {
          const file = new File([exportBlob], fileName, {type:"image/png"});
          if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
            await navigator.share({
              files:[file],
              title:"애완동물DM 꾸밈 사진",
              text:"애완동물DM 꾸밈 사진"
            });
            return;
          }
        } catch (err) {
          console.log("파일 공유 실패, fallback 사용", err);
        }
      }

      try {
        if (exportObjectUrl) {
          const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
          if (isIOS) {
            const opened = window.open(exportObjectUrl, "_blank");
            if (!opened) window.location.href = exportObjectUrl;
            return;
          }
          const a = document.createElement("a");
          a.href = exportObjectUrl;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          a.remove();
          return;
        }
      } catch (err) {
        console.log("blob url 다운로드 실패", err);
      }

      try {
        const a = document.createElement("a");
        a.href = exportDataUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
      } catch (err) {
        console.error(err);
        alert("저장에 실패했습니다. 결과 이미지를 길게 눌러 저장해 주세요.");
      }
    }

    startCameraBtn.addEventListener("click", startCamera);
    captureBtn.addEventListener("click", capturePhoto);
    retakeBtn.addEventListener("click", retakePhoto);
    downloadBtn.addEventListener("click", downloadResult);

    petType.addEventListener("change", () => {
      updatePetUI();
      if (capturedDataUrl) {
        lastQuote = pickRandom(currentPet().phrases);
        buildDecoratedImage();
      }
    });

    userHandle.addEventListener("input", () => {
      if (capturedDataUrl) {
        buildDecoratedImage();
      }
    });

    buildSelect();
    updatePetUI();
  </script>
</body>
</html>
